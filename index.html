<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>Ticker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;500;700;900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="drag-bar"></div>
    
    <div class="editorial-container">
        <!-- Global Export Button -->
        <button id="export-history-btn" class="global-export-btn" title="Export History to Word">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        </button>
        <!-- Huge header -->
        <header class="masthead">
            <h1>Ticker</h1>
            <div class="masthead-controls">
                <div class="currency-selector">
                    <input type="radio" id="currency-cny" name="currency" value="CNY" checked>
                    <label for="currency-cny" class="currency-btn">CNY</label>
                    <input type="radio" id="currency-usd" name="currency" value="USD">
                    <label for="currency-usd" class="currency-btn">USD</label>
                </div>
            </div>
        </header>

        <div class="split-view">
            <!-- Left: Control Panel -->
            <section class="control-panel">

                <!-- Calculators Stack -->

                <div class="calc-section" id="target-mode">
                    <h3 class="section-title">Target Projection</h3>


                    <div class="inputs-stack">
                        <div class="input-minimal-wrapper">
                            <input type="text" id="stock-symbol-1" class="input-minimal mono" placeholder="e.g. AAPL">
                            <span class="input-label">Symbol</span>
                        </div>
                        <div class="input-minimal-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="base-price" class="input-minimal mono" placeholder="0.00" step="any">
                            <span class="input-label">
                            Entry Price 
                            <button id="reuse-base-btn" class="inline-text-btn" title="Reverse Calculate Base Price">Rev. Calc</button>
                        </span>
                        </div>
                        <div class="input-minimal-wrapper percent-wrapper">
                            <span class="input-label">Movement Target</span>
                            <div class="inline-toggle-row">
                                <div class="input-container">
                                    <input type="number" id="percentage-change" class="input-minimal mono" placeholder="0.00" step="any">
                                    <span class="percent-symbol">%</span>
                                </div>
                                <div class="toggle-group direction-toggle inline-toggle">
                                    <input type="radio" id="move-up" name="movement" value="up" checked>
                                    <label for="move-up" class="toggle-btn up-btn">Up</label>
                                    <input type="radio" id="move-down" name="movement" value="down">
                                    <label for="move-down" class="toggle-btn down-btn">Down</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="result-display">
                        <div class="result-header">
                            <span class="result-label">
                                Target Price
                                <button id="reuse-target-btn" class="inline-text-btn" title="Replace Entry Price with this Target">Use as Entry</button>
                            </span>
                        </div>
                        <div class="result-value mono" id="target-result">
                            <span class="currency-symbol">¥</span>0.00
                        </div>
                    </div>

                    <button class="btn-minimal save-btn" id="save-target-btn">Save Projection</button>
                    <button class="clear-btn-inline" id="clear-target-btn">Clear</button>
                </div>

                <div class="calc-section" id="delta-mode">
                    <h3 class="section-title">Percentage Delta</h3>
                    <div class="inputs-stack">
                        <div class="input-minimal-wrapper">
                            <input type="text" id="stock-symbol-2" class="input-minimal mono" placeholder="e.g. 0700">
                            <span class="input-label">Symbol</span>
                        </div>
                        <div class="input-minimal-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="initial-price" class="input-minimal mono" placeholder="0.00" step="any">
                            <span class="input-label">
                                Initial Price
                                <button id="reuse-initial-btn" class="inline-text-btn" title="Reverse Calculate Initial Price">Rev. Calc</button>
                            </span>
                        </div>
                        <div class="input-minimal-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input type="number" id="final-price" class="input-minimal mono" placeholder="0.00" step="any">
                            <span class="input-label">
                                Final Price
                                <button id="reuse-final-btn" class="inline-text-btn" title="Reverse Calculate Final Price">Rev. Calc</button>
                            </span>
                        </div>
                    </div>

                    <div class="result-display">
                        <div class="result-header">
                            <span class="result-label">
                                Percentage Delta
                                <button id="reuse-calc-perc-btn" class="inline-text-btn" title="Copy to Target Projection Movement">Use as Target</button>
                            </span>
                        </div>
                        <div class="result-value mono" id="percentage-result">
                            0.00%
                        </div>
                        <div class="result-movement mono" id="percentage-movement-type">
                            -
                        </div>
                    </div>

                    <button class="btn-minimal save-btn" id="save-percentage-btn">Save Delta</button>
                    <button class="clear-btn-inline" id="clear-percentage-btn">Clear</button>
                </div>
            </section>
            
            <!-- Right: History Ledger -->
            <section class="ledger-panel">
                <div class="ledger-header">
                    <h2>History Ledger</h2>
                    <button class="clear-btn" id="clear-all-history-btn">Clear All</button>
                </div>
                
                <div class="quick-tags" id="quick-tags"></div>
                
                <div class="editorial-list" id="history-list">
                    <!-- Dynamic history rows will be injected here -->
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
